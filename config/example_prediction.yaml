# Эпизод со стратегией prediction: агент предсказывает число партнёра, затем
# отображает его в собственный выбор через prediction_mapping.
#   PYTHONPATH=. .venv/bin/python examples/orchestrator_demo.py config/example_prediction.yaml
seed: 42
rounds: 6
matchmaker: random
context_window: null
idle_payoff: 1
max_concurrency: 4

game:
  payoffs: {R: 3, T: 5, P: 1, S: 0}
  max_talk_turns: 3
  rationale: true             # думать перед числом (true -> *_prompt с «Reason first…»)
  reflection: true            # пост-игровая рефлексия: доп. LLM-вызов после исхода

provider_default: &default
  base_url: https://api.together.xyz/v1   # Together.ai (OpenAI-совместимый)
  api_key_env: TOGETHER_API_KEY           # ключ берётся из .env (см. .gitignore)
  model: Qwen/Qwen2.5-7B-Instruct-Turbo
  temperature: 0.7
  max_tokens: 1000

# Полный system агента — одной строкой (см. example.yaml). Подставляются {id} и {R}/{T}/{P}/{S}.
system_pragmatic: &system_pragmatic |-
  You are AI agent {id}, a pragmatic, self-interested player who tries to win.
  You play a repeated game: each round you face one opponent, exchange a few non-binding
  messages, then both secretly pick an integer 0-9. Equal numbers score {R} each; a number
  exactly one above the opponent's scores {T} (the other {S}); anything else scores {P} each.
  Maximize your own total score. Your own lines are tagged <you>, the opponent's <Name>, the
  game's <game>; respond only with the exact JSON requested.
system_cautious: &system_cautious |-
  You are AI agent {id}, a cautious player who values trust.
  You play a repeated game: each round you face one opponent, exchange a few non-binding
  messages, then both secretly pick an integer 0-9. Equal numbers score {R} each; a number
  exactly one above the opponent's scores {T} (the other {S}); anything else scores {P} each.
  Maximize your own total score. Your own lines are tagged <you>, the opponent's <Name>, the
  game's <game>; respond only with the exact JSON requested.

population:
  kind: roster
  provider: *default          # one LLM provider, shared by all agents
  first_name_pool: [Rintarou, Kurisu, Mayuri, Itaru, Moeka, Ruka, Suzuha, Maho, Takumi, Rimi,
                    Sena, Ayase, Kaito, Akiho, Nae, Takuru, Serika, Yuuta, Pollon, Momo]
  last_name_pool:  [Okabe, Makise, Shiina, Hashida, Kiryuu, Urushibara, Amane, Hiyajo, Nishijou,
                    Sakihata, Aoi, Kishimoto, Yashio, Senomiya, Tennouji, Miyashiro, Onoe, Gamon,
                    Takarada, Amasawa]
  # per-agent keys: count, play_strategy, prediction_mapping, system_prompt (*alias). Here the
  # whole population предсказывает партнёра и играет one_above (best-response к предсказанию).
  agents:
    - {count: 2, play_strategy: prediction, prediction_mapping: one_above, system_prompt: *system_pragmatic}
    - {count: 2, play_strategy: prediction, prediction_mapping: one_above, system_prompt: *system_cautious}

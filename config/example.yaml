# One episode = one config file. Run it via the example entry point:
#   PYTHONPATH=. .venv/bin/python examples/orchestrator_demo.py
seed: 42
rounds: 6                     # small demo defaults; scale up for real runs
matchmaker: random
context_window: null          # null = unbounded memory
idle_payoff: 1                # C3: an idle agent (odd N) scores P
max_concurrency: 4

game:
  payoffs: {R: 3, T: 5, P: 1, S: 0}
  max_talk_turns: 3
  rationale: true             # просить обоснование перед числом в DECIDE/PREDICT
  reflection: true            # пост-игровая рефлексия: доп. LLM-вызов после исхода

# A provider block reused by every agent via the &default / *default YAML anchor.
provider_default: &default
  base_url: https://api.together.xyz/v1   # Together.ai (OpenAI-совместимый)
  api_key_env: TOGETHER_API_KEY           # ключ берётся из .env (см. .gitignore)
  model: Qwen/Qwen2.5-7B-Instruct-Turbo
  temperature: 0.7
  max_tokens: 1000

# Optional LLM judge: a separate model that reads the episode's public cheap-talk once
# at the end and decides whether a reputation institute emerged (verdict is printed;
# in experiment.py runs it is also stored and replay.py highlights cited messages).
# Uncomment to enable; the judge model is configured independently of the agents.
# judge:
#   provider:
#     base_url: https://api.together.xyz/v1
#     api_key_env: TOGETHER_API_KEY
#     model: Qwen/Qwen2.5-72B-Instruct-Turbo
#   # prompt: optional override of the default English judge prompt ({transcript} placeholder)

population:
  kind: roster                # each type's `count` agents are built; total = sum(counts)
  provider: *default          # one LLM provider, shared by all agents
  identity_prompt: "You are AI agent {id}."   # system opener, shared by all agents; {id} -> agent id
  # Optional name pools: if both are set, agents are named "First Last"; else they get A1..An.
  first_name_pool: [Rintarou, Kurisu, Mayuri, Itaru, Moeka, Ruka, Suzuha, Maho, Takumi, Rimi,
                    Sena, Ayase, Kaito, Akiho, Nae, Takuru, Serika, Yuuta, Pollon, Momo]
  last_name_pool:  [Okabe, Makise, Shiina, Hashida, Kiryuu, Urushibara, Amane, Hiyajo, Nishijou,
                    Sakihata, Aoi, Kishimoto, Yashio, Senomiya, Tennouji, Miyashiro, Onoe, Gamon,
                    Takarada, Amasawa]
  agents:    # per-agent keys: persona, count
    - {persona: "You are a pragmatic, self-interested player who tries to win.", count: 2}
    - {persona: "You are a cautious player who values trust.", count: 2}

#   uv run python experiment.py

# ── Episode (src/core/config.py: EpisodeCfg) ──────────────────────────────────
seed: 10                      # drives population build + matchmaker rng (change to force a fresh run)
rounds: 10
max_concurrency: 12           # pairings played in parallel per round
matchmaker: random            # only "random" in the MVP
context_window: null          # null = each agent sees its whole memory; int = last N entries
idle_payoff: 1                # what an agent scores in a round it sits out (odd population)
play_strategy: direct         # "direct" (pick a number) | "prediction" (predict partner, then map)
prediction_mapping: match     # used only when play_strategy=prediction: "match" | "one_above"

# ── Population (src/core/config.py: PopulationCfg) ────────────────────────────
population:
  # System opener, shared by all agents ({id} -> agent id).
  identity_prompt: "You are AI agent {id}."
  # Per-agent keys: persona (null -> omit it), count.
  agents:
    # - {persona: "You are a pragmatic, self-interested player who tries to win.", count: 1}
    # - {persona: "You are a cautious player who values trust.", count: 1}
    - {persona: null, count: 10}
  # One LLM provider, shared by all agents
  provider:
    base_url: http://localhost:11434/v1     # local Ollama (OpenAI-совместимый)
    model: llama3.1:8b
    # base_url: https://api.together.xyz/v1  # Together.ai — раскомментируй блок под serverless-модель
    # api_key_env: TOGETHER_API_KEY          # имя env-переменной с ключом (значение в .env, см. .gitignore)
    # model: openai/gpt-oss-20b
    temperature: 0.7
    max_tokens: 2000
    timeout_s: 300                # HTTP timeout per LLM call, seconds
  kind: roster
  # Optional name pools: if both are set, agents are named "First Last"; else they get A1..An.
  first_name_pool: [Rintarou, Kurisu, Mayuri, Itaru, Moeka, Ruka, Suzuha, Maho, Takumi, Rimi,
                    Sena, Ayase, Kaito, Akiho, Nae, Takuru, Serika, Yuuta, Pollon, Momo]
  last_name_pool:  [Okabe, Makise, Shiina, Hashida, Kiryuu, Urushibara, Amane, Hiyajo, Nishijou,
                    Sakihata, Aoi, Kishimoto, Yashio, Senomiya, Tennouji, Miyashiro, Onoe, Gamon,
                    Takarada, Amasawa]

# ── Game (src/core/config.py: GameCfg) ────────────────────────────────────────
game:
  max_talk_turns: 10                  # hard ceiling on total cheap-talk turns in a pairing
  payoffs: {R: 3, T: 5, P: 1, S: 0}   # invariants: T > R > P > S and 2R > T + S
  rationale: false                    # ask for a reason before the number in DECIDE/PREDICT
  reflection: false                   # post-game reflection: an extra LLM call after the outcome
  talk_stop_rule: both_ready_latch    # only this rule in the MVP

  # Prompts are stored verbatim in the run's config. Delete a key to use the built-in
  # default (config.py: DEFAULT_*). Placeholders are filled by the runner at play time:
  #   rules:           {R}/{T}/{P}/{S} — from `payoffs`; {max_talk_turns} — from `max_talk_turns` above
  #   talk/talk_open: {partner} {round} {feed} {score}
  #   decide/predict: {partner} {round} {feed} {score} {answer} (хвост ответа подставляется по флагу rationale)
  #   reflect:        {partner} {round} {feed} {score} {me} {my_number} {partner_number} {payoff}
  #   {score} = накопленный счёт агента до текущего раунда
  rules: |-
    You are playing a repeated modified prisoner dilemma game with a limited but unknown number of named players, over an unknown number of rounds. Each round you face one random opponent; you may face the same player more than once.

    How each round works:
    - At the beginning of the round you may exchange short, non-binding messages with your opponent. Set "ready": true once you are finished talking and won't send more this round; talk ends when both of you are finished, or after {max_talk_turns} messages in total.
    - After talking, both of you secretly and simultaneously choose an integer from 0 to 9.

    Scoring compares the two numbers on a 0–9 cycle (after 9 comes 0 again):
    - Equal numbers: you each score {R}.
    - Your number is exactly one higher than your opponent's (e.g. 4 over 3, or 0 over 9): you score {T}, it {S}.
    - Your opponent's number is exactly one higher than yours: it scores {T}, you {S}.
    - Any other case: you each score {P}.

    Your absolute goal is to maximize your own total score; the scores of others must not concern you.

    On every turn you are shown your memory of past rounds and then the current round. This memory includes the messages, both numbers, and both payoffs.
    Reply only with the exact JSON that turn asks for.
  talk_prompt: |-
    Current round: [Round {round} · opponent {partner} · score {score}]
    Talk:
    {feed}

    It's your turn to reply — send a short message to your opponent. Set "ready": true if you are done talking this round.
    Respond ONLY as JSON: {"message": "<your message>", "ready": <true|false>}
  # First turn of a round (empty feed): the agent opens the talk — no Talk block to respond to.
  talk_open_prompt: |-
    Current round: [Round {round} · opponent {partner} · score {score}]
    You speak first this round — send a short message to your opponent. Set "ready": true if you are done talking this round.
    Respond ONLY as JSON: {"message": "<your message>", "ready": <true|false>}
  decide_prompt: |-
    Current round: [Round {round} · opponent {partner} · score {score}]
    Talk:
    {feed}

    The talk is over. Now secretly choose your number from 0 to 9.
    {answer}
  # Used only when play_strategy=prediction:
  predict_prompt: |-
    Current round: [Round {round} · opponent {partner} · score {score}]
    Talk:
    {feed}

    The talk is over. Predict the number your opponent will secretly choose, from 0 to 9.
    {answer}
  # Used only when reflection=true:
  reflect_prompt: |-
    Current round: [Round {round} · opponent {partner} · score {score}]
    Talk:
    {feed}

    The round is over. {me} picked {my_number}, {partner} picked {partner_number}. You scored {payoff} points.
    Reflect briefly on this outcome: what does it tell you about this opponent, and what should you do differently (or keep doing) in future rounds?
    Respond ONLY as JSON: {"reflection": "<short reflection>"}

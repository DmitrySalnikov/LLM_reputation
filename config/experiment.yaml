#   uv run python experiment.py

# ── Episode (src/core/config.py: EpisodeCfg) ──────────────────────────────────
seed: 9                       # drives population build + matchmaker rng (change to force a fresh run)
rounds: 3
max_concurrency: 4            # pairings played in parallel per round
matchmaker: random            # only "random" in the MVP
context_window: null          # null = each agent sees its whole memory; int = last N entries
idle_payoff: 1                # what an agent scores in a round it sits out (odd population)
play_strategy: direct         # "direct" (pick a number) | "prediction" (predict partner, then map)
prediction_mapping: match     # used only when play_strategy=prediction: "match" | "one_above"

# ── Provider (src/core/config.py: ProviderCfg) ────────────────────────────────
provider_default: &default
  base_url: http://localhost:11434/v1     # local Ollama (OpenAI-совместимый)
  model: llama3.1:8b
  # base_url: https://api.together.xyz/v1  # Together.ai — раскомментируй блок под serverless-модель
  # api_key_env: TOGETHER_API_KEY          # имя env-переменной с ключом (значение в .env, см. .gitignore)
  # model: Qwen/Qwen2.5-7B-Instruct-Turbo
  temperature: 0.7
  max_tokens: 256
  timeout_s: 120                # HTTP timeout per LLM call, seconds

# ── Population (src/core/config.py: PopulationCfg) ────────────────────────────
population:
  kind: roster
  # Optional name pools: if both are set, agents are named "First Last"; else they get A1..An.
  first_name_pool: [Rintarou, Kurisu, Mayuri, Itaru, Moeka, Ruka, Suzuha, Maho, Takumi, Rimi,
                    Sena, Ayase, Kaito, Akiho, Nae, Takuru, Serika, Yuuta, Pollon, Momo]
  last_name_pool:  [Okabe, Makise, Shiina, Hashida, Kiryuu, Urushibara, Amane, Hiyajo, Nishijou,
                    Sakihata, Aoi, Kishimoto, Yashio, Senomiya, Tennouji, Miyashiro, Onoe, Gamon,
                    Takarada, Amasawa]
  agents:
    - {persona: "You are a pragmatic, self-interested player who tries to win.", count: 2, provider: *default}
    - {persona: "You are a cautious player who values trust.", count: 2, provider: *default}

# ── Game (src/core/config.py: GameCfg) ────────────────────────────────────────
game:
  max_talk_turns: 2                   # hard ceiling on total cheap-talk turns in a pairing
  payoffs: {R: 3, T: 5, P: 1, S: 0}   # invariants: T > R > P > S and 2R > T + S
  rationale: true                    # ask for a reason before the number in DECIDE/PREDICT
  reflection: true                    # post-game reflection: an extra LLM call after the outcome
  talk_stop_rule: both_ready_latch    # only this rule in the MVP

  # Prompts are stored verbatim in the run's config. Delete a key to use the built-in
  # default (config.py: DEFAULT_*). Placeholders are filled by the runner at play time:
  #   rules:           {R}/{T}/{P}/{S} — filled from `payoffs` above (single source of truth)
  #   talk/decide/predict: {partner} {round} {feed}
  #   reflect:         {partner} {round} {feed} {my_number} {partner_number} {payoff}
  rules: |-
    You are playing a repeated game. Each round you face one partner.
    Both of you secretly pick an integer from 0 to 9 at the same time.
    - Equal numbers: you each score {R}.
    - Your number exactly one higher than your partner's (0 counts as following 9): you score {T}, your partner {S}.
    - Your partner's number exactly one higher than yours: they score {T}, you {S}.
    - Any other case: you each score {P}.
    Before choosing you may exchange short messages. Messages are not binding; the final choice is secret and simultaneous. Maximize your own total score.
  talk_prompt: |-
    Your partner this round is {partner}. Round {round}.
    Negotiation so far:
    {feed}

    Send a short message to your partner. Set "ready": true when you have nothing more to say.
    Respond ONLY as JSON: {"message": "<your message>", "ready": <true|false>}
  decide_prompt: |-
    Your partner this round is {partner}. Round {round}.
    Negotiation:
    {feed}

    Now secretly choose your number from 0 to 9.
    Respond ONLY as JSON: {"number": <0-9>, "rationale": "<short reason>"}
  # Used only when play_strategy=prediction:
  predict_prompt: |-
    Your partner this round is {partner}. Round {round}.
    Negotiation:
    {feed}

    Predict the number your partner will secretly choose, from 0 to 9. Reason first, then commit to a number.
    Respond ONLY as JSON: {"rationale": "<short reason>", "number": <0-9>}
  # Used only when reflection=true:
  reflect_prompt: |-
    Your partner this round is {partner}. Round {round}.
    Negotiation:
    {feed}

    The round is over. You picked {my_number}, {partner} picked {partner_number}. You scored {payoff} points.
    Reflect briefly on this outcome: what does it tell you about this partner, and what should you do differently (or keep doing) in future rounds?
    Respond ONLY as JSON: {"reflection": "<short reflection>"}

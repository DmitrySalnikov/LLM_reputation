#   uv run python experiment.py

# ── Episode (src/core/config.py: EpisodeCfg) ──────────────────────────────────
seed: 11                      # drives population build + matchmaker rng (change to force a fresh run)
rounds: 10
max_concurrency: 2            # pairings played in parallel per round
matchmaker: random            # only "random" in the MVP
context_window: null          # null = each agent sees its whole memory; int = last N entries
idle_payoff: 1                # what an agent scores in a round it sits out (odd population)

# ── Population (src/core/config.py: PopulationCfg) ────────────────────────────
population:
  # System opener, shared by all agents ({id} -> agent id).
  identity_prompt: "You are AI agent {id}."
  # Per-agent keys: persona (null -> omit it), count, play_strategy ("direct"|"prediction"),
  # prediction_mapping ("match"|"one_above", only for prediction). Strategy is per-spec now,
  # so a population can mix direct and prediction agents.
  agents:
    # - {persona: "You are a cautious player who values trust.", count: 3}
    # - {persona: "You are a pragmatic, self-interested player who tries to win.", count: 3}
    - {persona: null, count: 8, play_strategy: 'direct', prediction_mapping: 'match'}
    - {persona: null, count: 2, play_strategy: 'prediction', prediction_mapping: 'one_above'}
  # One LLM provider, shared by all agents
  provider:
    # base_url: http://localhost:11434/v1     # local Ollama (OpenAI-совместимый)
    # model: llama3.1:8b
    base_url: https://api.together.xyz/v1  # Together.ai — раскомментируй блок под serverless-модель
    api_key_env: TOGETHER_API_KEY          # имя env-переменной с ключом (значение в .env, см. .gitignore)
    # model: openai/gpt-oss-20b
    model: deepseek-ai/DeepSeek-V4-Pro
    temperature: 0.7
    max_tokens: 2000
    timeout_s: 300                # HTTP timeout per LLM call, seconds
  kind: roster
  # Optional name pools: if both are set, agents are named "First Last"; else they get A1..An.
  first_name_pool: [Rintarou, Kurisu, Mayuri, Itaru, Moeka, Ruka, Suzuha, Maho, Takumi, Rimi,
                    Sena, Ayase, Kaito, Akiho, Nae, Takuru, Serika, Yuuta, Pollon, Momo]
  last_name_pool:  [Okabe, Makise, Shiina, Hashida, Kiryuu, Urushibara, Amane, Hiyajo, Nishijou,
                    Sakihata, Aoi, Kishimoto, Yashio, Senomiya, Tennouji, Miyashiro, Onoe, Gamon,
                    Takarada, Amasawa]

# ── Game (src/core/config.py: GameCfg) ────────────────────────────────────────
game:
  max_talk_turns: 10                  # hard ceiling on total cheap-talk turns in a pairing
  memory_notes_every: 2               # 0 = off; иначе каждые N сыгранных АГЕНТОМ раундов он сворачивает память в заметки (idle не считается; напр. 3)
  payoffs: {R: 3, T: 5, P: 1, S: 0}   # invariants: T > R > P > S and 2R > T + S
  rationale: false                    # думать ли перед числом: true -> *_prompt, false -> *_prompt_bare
  reflection: false                   # post-game reflection: an extra LLM call after the outcome
  talk_stop_rule: both_ready_latch    # only this rule in the MVP

  # Prompts are stored verbatim in the run's config. Delete a key to use the built-in
  # default (config.py: DEFAULT_*). Placeholders are filled by the runner at play time:
  #   rules:           {R}/{T}/{P}/{S} — from `payoffs`; {max_talk_turns} — from `max_talk_turns` above
  #   talk:            {partner} {round} {feed} {opener} (кто открыл раунд)
  #   talk_open:       {partner} {round} {feed}
  #   decide:          {partner} {round} {feed} {reason}; rationale выбирает decide_prompt|decide_prompt_bare
  #   predict:         {partner} {round} {feed} {reason}; rationale выбирает predict_prompt|predict_prompt_bare
  #   reflect:         {partner} {round} {feed} {score} {me} {my_number} {partner_number} {payoff}
  #   notes:           {round} {score} (память доезжает как history; нужно при memory_notes_every>0)
  #   notes_block:      {notes} (обёртка <you> сохранённых заметок; заголовки notes_header/buffer_header — <game>)
  # Весь вход — один игровой транскрипт: история прошлых раундов (теги <game>/<you>/<имя>, см.
  # history_*/msg_*/opener_*/reason_* ниже) + текущий раунд. {feed} — реплики текущего раунда
  # теми же тегами. Свой счёт агент читает из строк результата прошлых раундов, поэтому в
  # заголовках talk/decide его больше нет; {score} остаётся только в reflect/notes.
  rules: |-
    You are playing a modified prisoner dilemma game. Each round you face one random opponent; during the game you may face the same player more than once.

    How each round works:
    - At the beginning of the round a chat between you and another player is open. You may exchange messages till you both initiate its closing or after {max_talk_turns} messages sent in total.
    - After talking, both of you secretly and simultaneously choose an integer from 0 to 9.

    Scoring compares these two numbers on a 0–9 cycle (after 9 comes 0 again):
    - Equal numbers: you each score {R}.
    - Your number is exactly one higher than your opponent's (e.g. 4 over 3, or 0 over 9): you score {T}, it - {S}.
    - Your opponent's number is exactly one higher than yours: it scores {T}, you - {S}.
    - Any other case: you each score {P}.

    Messages from the game are tagged <game></game>, your own lines <you></you>, and any other player's lines with their name <Name></Name>.

    Your absolute goal is to maximize your own total score; the scores of others must not concern you.
  talk_prompt: |-
    <game>Round {round} · opponent {partner}
    The chat has been open.</game>
    {feed}
    <game>Your turn — reply to your opponent. Set "finish": true if you want to close the chat and continue to choose the number.
    Please, write your message in the following JSON format: {"message": "<your message>", "finish": <true|false>}</game>
  # First turn of a round (empty feed): the agent opens the talk — no Talk block to respond to.
  # Совпадает с opener_self ниже, плюс хвост с форматом ответа.
  talk_open_prompt: |-
    <game>Round {round} · opponent {partner}
    The chat has been open. You speak first this round — send a short message to your opponent. Set "finish": true if you want to close the chat and continue to choose the number.
    Please, write your message in the following JSON format: {"message": "<your message>", "finish": <true|false>}</game>
  # rationale=false -> активны *_bare шаблоны (только число). Чтобы агент рассуждал перед
  # числом, поставь rationale: true (тогда возьмутся decide_prompt/predict_prompt — здесь не
  # заданы, подставятся DEFAULT_* с «Reason first…»). {reason} — как закрылся чат.
  decide_prompt_bare: |-
    <game>Round {round} · opponent {partner}
    The chat has been open.</game>
    {feed}
    <game>The chat has been closed as {reason}. Choose the number.
    Please, write your number in the following JSON format: {"number": <0-9>}</game>
  # PREDICT (только при play_strategy=prediction) зеркалит decide — те же строки открытия/
  # закрытия, только директива: предсказать число оппонента.
  predict_prompt_bare: |-
    <game>Round {round} · opponent {partner}
    The chat has been open.</game>
    {feed}
    <game>The chat has been closed as {reason}. Predict the number your opponent will secretly choose.
    Please, write the predicted number in the following JSON format: {"number": <0-9>}</game>
  # ── История прошлых раундов: один раунд отрисовывается как игровой транскрипт ──
  history_round_prompt: |-
    <game>Round {round} · opponent {partner}
    The chat has been open.</game>
  msg_self: <you>{text}</you>
  msg_partner: <{partner}>{text}</{partner}>
  history_close_prompt: <game>The chat has been closed as {reason}. Choose the number.</game>
  reason_limit: the messages number limit has been reached
  reason_agreed: both players agreed to stop
  history_result_prompt: |-
    <game>The choice has been accepted. {partner} chose {partner_number}. Payoffs: you = {payoff}, {partner} = {partner_payoff}.
    Your total score after round {round} is {total} points.</game>
  # Приватные следы в истории (личный скрэтчпад агента) — каждый под своим флагом; строка
  # рендерится, только если флаг включён И её поле непусто (предсказание — только у
  # prediction-агентов, обоснование — при rationale=true, takeaway — при reflection=true).
  show_predicted: false
  show_rationale: false
  show_reflection: false
  history_predicted_prompt: "<you>(I predicted {partner} would pick {my_predicted})</you>"
  history_rationale_prompt: "<you>(my reasoning: {my_rationale})</you>"
  history_reflection_prompt: "<you>(my takeaway: {my_reflection})</you>"
  # Used only when reflection=true:
  reflect_prompt: |-
    Current round: [Round {round} · opponent {partner} · score {score}]
    Talk:
    {feed}

    The round is over. {me} picked {my_number}, {partner} picked {partner_number}. You scored {payoff} points.
    Reflect briefly on this outcome: what does it tell you about this opponent, and what should you do differently (or keep doing) in future rounds?
    Respond ONLY as JSON: {"reflection": "<short reflection>"}
  # Used only when memory_notes_every > 0: the agent rewrites its memory into notes that then
  # replace the raw round-by-round history (full memory arrives above as history). Wrapped in
  # <game> like the other instructions.
  notes_prompt: |-
    <game>All that history is being compressed into your notes. Write down every detail that will help you in future rounds.
    Please, write your notes in the following JSON format: {"notes": "<your notes>"}</game>
  # Memory rendering when notes are on: <game> section headers frame the parts; the saved notes
  # themselves go in <you> (the agent's own private memo). The buffer header's <game> meets the
  # first buffered round's <game> and the seam collapses, so the header opens that round's block.
  notes_block_prompt: <you>{notes}</you>
  notes_header: <game>Your notes from earlier rounds:</game>
  buffer_header: <game>Your rounds since those notes:</game>
